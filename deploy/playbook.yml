---
- name: Deploy Rush Hour backend
  hosts: rush-hour
  become: true

  vars:
    app_dir: /opt/rush-hour
    app_user: rush-hour
    binary_src: "{{ playbook_dir }}/../backend/server"
    db_src: "{{ playbook_dir }}/../parser/data/timetable.db"

  tasks:
    - name: Install redis
      ansible.builtin.package:
        name: redis
        state: present

    - name: Ensure redis is enabled and running
      ansible.builtin.systemd:
        name: redis
        enabled: true
        state: started

    - name: Create app user
      ansible.builtin.user:
        name: "{{ app_user }}"
        system: true
        shell: /usr/sbin/nologin
        create_home: false

    - name: Create app directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: "0750"
      loop:
        - "{{ app_dir }}"
        - "{{ app_dir }}/data"

    - name: Copy binary
      ansible.builtin.copy:
        src: "{{ binary_src }}"
        dest: "{{ app_dir }}/server"
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: "0755"
      notify: Restart backend

    - name: Copy timetable database
      ansible.builtin.copy:
        src: "{{ db_src }}"
        dest: "{{ app_dir }}/data/timetable.db"
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: "0640"

    - name: Install systemd unit
      ansible.builtin.copy:
        src: files/rush-hour-backend.service
        dest: /etc/systemd/system/rush-hour-backend.service
        mode: "0644"
      notify:
        - Reload systemd
        - Restart backend

    - name: Enable and start backend
      ansible.builtin.systemd:
        name: rush-hour-backend
        enabled: true
        state: started

  handlers:
    - name: Reload systemd
      ansible.builtin.systemd:
        daemon_reload: true

    - name: Restart backend
      ansible.builtin.systemd:
        name: rush-hour-backend
        state: restarted
