services:
  backend:
    build: .
    ports:
      - "8080:8080"
    environment:
      ADDR: ":8080"
      TIMETABLE_DB_PATH: /data/timetable.db
      REDIS_URL: redis:6379
      TIMETABLE_UPDATE_INTERVAL: "1h"
    volumes:
      - ../parser/data/timetable.db:/data/timetable.db:ro
    depends_on:
      redis:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
