name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs['mobile--release_created'] }}
      tag_name: ${{ steps.release.outputs['mobile--tag_name'] }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          cache-cleanup: always
          cache-read-only: false

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install Android SDK components
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platform-tools" \
            "platforms;android-35" \
            "build-tools;35.0.0" \
            "ndk;27.1.12297006"

      - name: Decode release keystore
        run: echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 -d > mobile/upload-keystore.jks

      - name: Set up Gradle signing properties
        run: |
          mkdir -p ~/.gradle
          {
            echo "RUSH_HOUR_STORE_PASSWORD=${{ secrets.RUSH_HOUR_STORE_PASSWORD }}"
            echo "RUSH_HOUR_KEY_ALIAS=${{ secrets.RUSH_HOUR_KEY_ALIAS }}"
            echo "RUSH_HOUR_KEY_PASSWORD=${{ secrets.RUSH_HOUR_KEY_PASSWORD }}"
          } >> ~/.gradle/gradle.properties

      - name: Install dependencies
        working-directory: mobile
        run: npm ci

      - name: Compute and set versionCode
        working-directory: mobile
        run: |
          tag="${{ needs.release-please.outputs.tag_name }}"
          version="${tag#v}"
          IFS='.' read -r major minor patch <<< "$version"
          versionCode=$((major * 10000 + minor * 100 + patch))
          jq --argjson vc "$versionCode" '.expo.android.versionCode = $vc' app.json > app.json.tmp && mv app.json.tmp app.json

      - name: Prebuild
        working-directory: mobile
        run: npx expo prebuild --platform android

      - name: Build release APKs
        working-directory: mobile/android
        run: ./gradlew assemblePlayRelease
        env:
          EXPO_PUBLIC_API_URL: ${{ vars.EXPO_PUBLIC_API_URL }}
          EXPO_PUBLIC_DISTRIBUTION: github

      - name: Upload APKs to release
        run: |
          tag="${{ needs.release-please.outputs.tag_name }}"
          cd mobile/android/app/build/outputs/apk/play/release

          for apk in *.apk; do
            base="${apk%.apk}"
            mv "$apk" "${base}-${tag}.apk"
          done

          gh release upload "$tag" *-${tag}.apk
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
