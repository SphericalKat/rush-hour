name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      body: ${{ steps.release.outputs.body }}
    steps:
      - uses: googleapis/release-please-action@v4.4.0
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    outputs:
      version_code: ${{ steps.version.outputs.version_code }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          cache-cleanup: always
          cache-read-only: false

      - name: Set up Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install Android SDK components
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platform-tools" \
            "platforms;android-35" \
            "build-tools;35.0.0" \
            "ndk;27.1.12297006"

      - name: Decode release keystore
        run: echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 -d > mobile/upload-keystore.jks

      - name: Set up Gradle signing properties
        run: |
          mkdir -p ~/.gradle
          {
            echo "RUSH_HOUR_STORE_PASSWORD=${{ secrets.RUSH_HOUR_STORE_PASSWORD }}"
            echo "RUSH_HOUR_KEY_ALIAS=${{ secrets.RUSH_HOUR_KEY_ALIAS }}"
            echo "RUSH_HOUR_KEY_PASSWORD=${{ secrets.RUSH_HOUR_KEY_PASSWORD }}"
          } >> ~/.gradle/gradle.properties

      - name: Install dependencies
        working-directory: mobile
        run: npm ci

      - name: Compute and set versionCode
        id: version
        working-directory: mobile
        run: |
          tag="${{ needs.release-please.outputs.tag_name }}"
          version="${tag#v}"
          IFS='.' read -r major minor patch <<< "$version"
          versionCode=$((major * 10000 + minor * 100 + patch))
          echo "version_code=$versionCode" >> "$GITHUB_OUTPUT"
          jq --argjson vc "$versionCode" '.expo.android.versionCode = $vc' app.json > app.json.tmp && mv app.json.tmp app.json

      - name: Prebuild
        working-directory: mobile
        run: npx expo prebuild --platform android

      - name: Build release APKs and AAB
        working-directory: mobile/android
        run: ./gradlew assemblePlayRelease bundlePlayRelease
        env:
          EXPO_PUBLIC_API_URL: ${{ vars.EXPO_PUBLIC_API_URL }}
          EXPO_PUBLIC_DISTRIBUTION: github

      - name: Upload artifacts to GitHub release
        run: |
          tag="${{ needs.release-please.outputs.tag_name }}"

          cd mobile/android/app/build/outputs/apk/play/release
          for apk in *.apk; do
            base="${apk%.apk}"
            mv "$apk" "${base}-${tag}.apk"
          done

          cd /home/runner/work/rush-hour/rush-hour
          gh release upload "$tag" \
            mobile/android/app/build/outputs/apk/play/release/*-${tag}.apk \
            mobile/android/app/build/outputs/bundle/playRelease/app-play-release.aab
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy:
    needs: [release-please, build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '4.0.1'
          bundler-cache: true

      - name: Download AAB from release
        run: |
          tag="${{ needs.release-please.outputs.tag_name }}"
          mkdir -p mobile/android/app/build/outputs/bundle/playRelease
          gh release download "$tag" --pattern "app-play-release.aab" --dir mobile/android/app/build/outputs/bundle/playRelease
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Play Store changelog
        run: |
          mkdir -p fastlane/metadata/android/en-US/changelogs
          echo "${{ needs.release-please.outputs.body }}" | head -c 500 > "fastlane/metadata/android/en-US/changelogs/${{ needs.build.outputs.version_code }}.txt"

      - name: Deploy to Google Play
        run: bundle exec fastlane android deploy
        env:
          PLAY_STORE_SERVICE_ACCOUNT_JSON: ${{ secrets.PLAY_STORE_SERVICE_ACCOUNT_JSON }}
